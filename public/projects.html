<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vitor.Dev | Portfólio</title>

		<link rel="stylesheet" href="./css/fonts.css" />
		<script src="https://cdn.tailwindcss.com"></script>
		<script src="./js/script.js" defer></script>
	</head>
	<body class="bg-black overflow-x-hidden overflow-y-scroll">
		<header class="h-[65px] flex items-center justify-center px-10">
			<div class="flex items-center justify-between w-full max-w-[925px]">
				<!--Logo_Name-->
				<p class="text-white font-[CRONDE-Regular] text-2xl">Vitor.Dev</p>

				<!-- Botão Menu DropDown Mobile -->
				<button id="menuBtn" class="md:hidden flex flex-col gap-1">
					<span class="w-6 h-0.5 bg-white block"></span>
					<span class="w-6 h-0.5 bg-white block"></span>
					<span class="w-6 h-0.5 bg-white block"></span>
				</button>

				<!--Menu DropDown Mobile-->
				<div
					id="menuMobile"
					class="fixed top-0 right-0 w-64 h-full bg-black/95 shadow-lg transform translate-x-full transition-transform duration-300 z-50 flex flex-col p-8 gap-6"
				>
					<button id="closeMenu" class="text-white text-3xl self-end">×</button>

					<a
						href="../index.html"
						class="text-white text-lg font-[CRONDE-Regular]"
						>Home</a
					>
					<a
						href="./projects.html"
						class="text-white text-lg font-[CRONDE-Regular]"
						>> Projetos</a
					>
					<a
						href="./habilities.html"
						class="text-white text-lg font-[CRONDE-Regular]"
						>Habilidades</a
					>
					<a
						href="./about.html"
						class="text-white text-lg font-[CRONDE-Regular]"
						>Sobre</a
					>
				</div>

				<!--Nav_Bar_Desktop-->
				<nav
					class="text-white hidden md:flex font-[CRONDE-Regular] gap-5 items-center justify-center text-base"
				>
					<a class="relative group" href="../index.html">
						Home
						<span
							class="absolute left-1/2 -bottom-px h-[0.8px] w-0 bg-white transition-all duration-300 group-hover:w-full -translate-x-1/2"
						></span>
					</a>
					<a class="relative group" href="./projects.html">
						Projetos
						<span
							class="absolute left-1/2 -bottom-px h-[0.8px] w-full bg-white transition-all duration-300 group-hover:w-full -translate-x-1/2"
						></span>
					</a>
					<a class="relative group" href="./habilities.html">
						Habilidades
						<span
							class="absolute left-1/2 -bottom-px h-[0.8px] w-0 bg-white transition-all duration-300 group-hover:w-full -translate-x-1/2"
						></span>
					</a>
					<a class="relative group" href="./about.html">
						Sobre
						<span
							class="absolute left-1/2 -bottom-px h-[0.8px] w-0 bg-white transition-all duration-300 group-hover:w-full -translate-x-1/2"
						></span>
					</a>
				</nav>
			</div>
		</header>

		<main>
			<!--Title Projects and Line-->
			<div class="w-full mt-5 px-5">
				<div class="relative flex items-center w-full">
					<!-- Linha inteira -->
					<div class="absolute left-0 right-0 h-[3px] bg-blue-400"></div>

					<!-- Texto posicionado depois do começo da linha -->
					<h1
						class="relative bg-black px-4 ml-14 sm:ml-20 md:ml-28 text-white text-3xl sm:text-4xl font-[CRONDE-Regular]"
					>
						Projetos
					</h1>
				</div>
			</div>

			<!--Section da "Área em desenvolvimento!"-->
			<div class="justify-center items-center flex flex-col pt-36 pb-36">
				<img
					class="w-24 sm:w-32"
					src="./assets/icons/obras_icon.png"
					alt="obras"
				/>
				<p class="text-white font-[CRONDE-Regular] text-xl sm:text-2xl mt-2">
					Área em desenvolvimento!
				</p>
			</div>
		</main>

		<footer class="relative w-full py-8 mt-10 bg-black">
			<!-- Linha luminosa -->
			<div
				class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-blue-400 to-transparent opacity-60"
			></div>

			<!--Social links-->
			<div class="flex gap-5 justify-center mb-3">
				<a
					href="https://github.com/Vitor-Bernardes"
					target="_blank"
					rel="noopener noreferrer"
					class="relative group w-10 h-10 flex items-center justify-center"
				>
					<!-- Bolha animada -->
					<span
						class="absolute w-0 h-0 bg-blue-600/65 rounded-full transition-all duration-300 group-hover:w-12 group-hover:h-12 group-hover:opacity-100 opacity-0"
					>
					</span>

					<!-- Ícone -->
					<img
						src="./assets/icons/github-icon.svg"
						class="w-8 h-8 relative z-10"
					/>
				</a>

				<a
					href="https://www.linkedin.com/in/vitor-bernardes-217b6a292"
					target="_blank"
					rel="noopener noreferrer"
					class="relative group w-10 h-10 flex items-center justify-center"
				>
					<span
						class="absolute w-0 h-0 bg-blue-600/65 rounded-full transition-all duration-300 group-hover:w-12 group-hover:h-12 group-hover:opacity-100 opacity-0"
					>
					</span>

					<img
						src="./assets/icons/linkedin-icon.svg"
						class="w-8 h-8 relative z-10"
					/>
				</a>
			</div>

			<!--Direitos autorais-->
			<div
				class="max-w-[1200px] mx-auto px-6 text-center text-white/60 text-sm"
			>
				© 2026 Vitor.Dev • Todos os direitos reservados
			</div>
		</footer>
	</body>
</html>
